name: Convert PPTX to PDF (replace)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convert all PPTX to PDF (same folder) and delete PPTX
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(**/*.pptx)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .pptx files found."
            exit 0
          fi

          for f in "${files[@]}"; do
            dir="$(dirname "$f")"
            echo "Converting: $f"
            libreoffice --headless --nologo --nofirststartwizard --convert-to pdf --outdir "$dir" "$f"
            rm -f "$f"
          done

      - name: Commit & push to main if changed
        run: |
          set -e
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Convert PPTX to PDF (replace PPTX)"
          git push origin HEAD:main
